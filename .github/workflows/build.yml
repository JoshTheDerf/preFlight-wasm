name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      preflight_ref:
        description: 'preFlight upstream ref to build against (commit SHA or tag)'
        required: false
        default: 'v1.0.0'

env:
  # Pin the emsdk version. Tested with 5.0.7 locally; bump deliberately.
  EMSDK_VERSION: '5.0.7'

  # Pin the preFlight upstream commit. The patch in patches/preflight-wasm.patch
  # is hand-curated against this revision. If you bump this, expect to
  # rewrite parts of the patch.
  PREFLIGHT_REF: '${{ github.event.inputs.preflight_ref || ''v1.0.0'' }}'

  BOOST_VERSION: '1.83.0'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out preflight-wasm
        uses: actions/checkout@v4
        with:
          path: preflight-wasm

      - name: Check out preFlight upstream (pinned)
        uses: actions/checkout@v4
        with:
          repository: oozebot/preFlight
          ref: ${{ env.PREFLIGHT_REF }}
          path: preflight

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build ccache \
            python3 python3-pip \
            autoconf libtool texinfo m4 \
            curl wget ca-certificates
          cmake --version
          ccache --version

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ------------------------------------------------------------------
      # emsdk — cached by version. Cold install ~3 min.
      # ------------------------------------------------------------------
      - name: Cache emsdk
        id: cache-emsdk
        uses: actions/cache@v4
        with:
          path: preflight-wasm/deps/emsdk
          key: emsdk-${{ runner.os }}-${{ env.EMSDK_VERSION }}

      - name: Install emsdk
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        working-directory: preflight-wasm
        run: |
          mkdir -p deps
          if [ ! -d deps/emsdk ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git deps/emsdk
          fi
          cd deps/emsdk
          ./emsdk install "${{ env.EMSDK_VERSION }}"
          ./emsdk activate "${{ env.EMSDK_VERSION }}"

      - name: Activate emsdk env for subsequent steps
        working-directory: preflight-wasm
        run: |
          # shellcheck disable=SC1091
          source deps/emsdk/emsdk_env.sh
          {
            echo "EMSDK=$EMSDK"
            echo "EM_CONFIG=$EM_CONFIG"
            echo "EM_CACHE=$EM_CACHE"
            echo "EMSDK_NODE=$EMSDK_NODE"
          } >> "$GITHUB_ENV"
          {
            echo "$EMSDK"
            echo "$EMSDK/upstream/emscripten"
            echo "$EMSDK/upstream/bin"
          } >> "$GITHUB_PATH"
          emcc -v 2>&1 | head -3

      # ------------------------------------------------------------------
      # Vendor sources (header-only / small) — quick to redownload but the
      # cache hit cuts ~30 s and removes a transient-failure surface.
      # ------------------------------------------------------------------
      - name: Cache vendored sources
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: |
            preflight-wasm/deps/eigen
            preflight-wasm/deps/nanosvg
            preflight-wasm/deps/nlohmann_json
            preflight-wasm/deps/expat-2.6.3
            preflight-wasm/deps/heatshrink-src
          key: vendor-${{ hashFiles('preflight-wasm/.github/workflows/build.yml') }}

      - name: Fetch vendored sources
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        working-directory: preflight-wasm/deps
        run: |
          set -euxo pipefail

          # Eigen 3.4 (header-only) — shallow clone is the simplest robust path.
          if [ ! -d eigen ]; then
            git clone --depth 1 --branch 3.4 https://gitlab.com/libeigen/eigen.git eigen
          fi

          # nanosvg (header-only).
          if [ ! -d nanosvg ]; then
            git clone --depth 1 https://github.com/memononen/nanosvg.git nanosvg
          fi

          # nlohmann_json 3.11 (single header + bundled CMake config).
          if [ ! -d nlohmann_json ]; then
            mkdir -p nlohmann_json/include/nlohmann nlohmann_json/lib/cmake/nlohmann_json
            curl -fsSL -o nlohmann_json/include/nlohmann/json.hpp \
              https://github.com/nlohmann/json/releases/download/v3.11.3/json.hpp
            # Inline cmake config — avoids YAML/heredoc indentation pitfalls.
            printf '%s\n' \
              'add_library(nlohmann_json::nlohmann_json INTERFACE IMPORTED)' \
              'set_target_properties(nlohmann_json::nlohmann_json PROPERTIES' \
              '    INTERFACE_INCLUDE_DIRECTORIES "${CMAKE_CURRENT_LIST_DIR}/../../../include")' \
              > nlohmann_json/lib/cmake/nlohmann_json/nlohmann_jsonConfig.cmake
          fi

          # EXPAT 2.6.3 (tarball; bundled CMakeLists.txt under deps/expat-2.6.3 is
          # checked in to preflight-wasm — we drop the tarball src tree alongside).
          if [ ! -d expat-2.6.3 ]; then
            curl -fsSL -o expat.tar.bz2 \
              https://github.com/libexpat/libexpat/releases/download/R_2_6_3/expat-2.6.3.tar.bz2
            tar xf expat.tar.bz2
            rm expat.tar.bz2
          fi

          # heatshrink 0.4.1 (tarball; custom CMakeLists.txt checked in).
          if [ ! -d heatshrink-src ]; then
            git clone --depth 1 --branch v0.4.1 https://github.com/atomicobject/heatshrink.git heatshrink-src
          fi

      # ------------------------------------------------------------------
      # Boost 1.83 (cross-built for wasm32). Cold build ~20 min.
      # Cache key includes emsdk version + the build script hash, because both
      # affect the produced static libs.
      # ------------------------------------------------------------------
      - name: Cache Boost install
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: preflight-wasm/deps/boost-wasm/install
          key: boost-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ env.BOOST_VERSION }}-${{ hashFiles('preflight-wasm/deps/boost-wasm/build_boost.sh') }}

      - name: Build Boost for WASM
        if: steps.cache-boost.outputs.cache-hit != 'true'
        working-directory: preflight-wasm
        run: |
          # build_boost.sh fetches the Boost tarball itself.
          NPROC=4 bash deps/boost-wasm/build_boost.sh

      # ------------------------------------------------------------------
      # GMP + MPFR + CGAL 6.1. Cold build ~10 min. Depends on Boost.
      # ------------------------------------------------------------------
      - name: Cache math install (GMP / MPFR / CGAL)
        id: cache-math
        uses: actions/cache@v4
        with:
          path: preflight-wasm/deps/toolchain-wasm/install
          key: math-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('preflight-wasm/deps/toolchain-wasm/build_math.sh', 'preflight-wasm/deps/boost-wasm/build_boost.sh') }}

      - name: Build math toolchain
        if: steps.cache-math.outputs.cache-hit != 'true'
        working-directory: preflight-wasm
        run: |
          NPROC=4 bash deps/toolchain-wasm/build_math.sh

      # ------------------------------------------------------------------
      # ccache — large, restorable across runs. Loosely keyed to keep the
      # cache fresh across commits while still falling back to prior runs.
      # ------------------------------------------------------------------
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: preflight-wasm/deps/ccache-cache
          key: ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        working-directory: preflight-wasm
        run: |
          mkdir -p deps/ccache
          # The repo's build-wasm.sh adds deps/ccache/ to PATH if it exists;
          # populate it with a thin shim to /usr/bin/ccache so identical
          # invocations are caught.
          cat > deps/ccache/ccache <<'SHIM'
          #!/usr/bin/env bash
          exec /usr/bin/ccache "$@"
          SHIM
          chmod +x deps/ccache/ccache
          export CCACHE_DIR="$PWD/deps/ccache-cache"
          ccache --max-size=2G
          ccache --zero-stats

      # ------------------------------------------------------------------
      # Build the slicer.
      # ------------------------------------------------------------------
      - name: Build slicer.{js,wasm,data}
        working-directory: preflight-wasm
        env:
          NPROC: '4'
          CCACHE_DIR: ${{ github.workspace }}/preflight-wasm/deps/ccache-cache
        run: |
          bash scripts/build-wasm.sh
          echo '--- artifacts ---'
          ls -la build-wasm/slicer.{js,wasm,data}
          du -h build-wasm/slicer.{js,wasm,data}

      - name: ccache stats
        working-directory: preflight-wasm
        env:
          CCACHE_DIR: ${{ github.workspace }}/preflight-wasm/deps/ccache-cache
        run: ccache --show-stats

      # ------------------------------------------------------------------
      # Tests
      # ------------------------------------------------------------------
      - name: Run baseline slice test
        working-directory: preflight-wasm
        run: |
          node tests/slice-test.cjs
          node tests/verify-gcode.cjs

      # ------------------------------------------------------------------
      # Upload as workflow artifact for every build
      # ------------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slicer-wasm-${{ github.sha }}
          path: |
            preflight-wasm/build-wasm/slicer.js
            preflight-wasm/build-wasm/slicer.wasm
            preflight-wasm/build-wasm/slicer.data
          retention-days: 30

      # ------------------------------------------------------------------
      # On tag push: publish to GitHub release.
      # ------------------------------------------------------------------
      - name: Publish to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            preflight-wasm/build-wasm/slicer.js
            preflight-wasm/build-wasm/slicer.wasm
            preflight-wasm/build-wasm/slicer.data
          fail_on_unmatched_files: true
          body: |
            preFlight WASM build for `${{ github.ref_name }}`.

            Built against preFlight `${{ env.PREFLIGHT_REF }}` with emsdk `${{ env.EMSDK_VERSION }}`.

            Drop these three files into your web app's `public/wasm/preflight/`
            and load `slicer.js` to instantiate `PreflightModule`.
            See README and PORTING.md for the JS-side API and known limitations.
